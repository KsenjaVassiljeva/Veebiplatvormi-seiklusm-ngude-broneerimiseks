<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Kalnia&family=Lora&display=swap" rel="stylesheet">
  <title>Questoria</title>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Questoria logo">
  </a>

  <nav class="nav">
    <a href="catalog.html" data-key="catalog">Catalog</a>
    <span>|</span>
    <a href="contacts.html" data-key="contact">Contact</a>
    <span>|</span>
    <a href="about.html" data-key="about">About us</a>
  </nav>

  <div class="actions">
    <button class="lang">En</button>
    <a href="login.html" class="login-small" data-key="login">Log in</a>
  </div>
</header>

<main>

  <section class="hero">
    <img src="images/main.png" alt="Quest room">
  </section>

  <section class="recommended">
    <h1 data-key="recommended">Recommended quests</h1>

    <div class="cards" id="quests-container">
      <p>Loading quests...</p>
    </div>

    <a href="catalog.html" class="more" data-key="more">more</a>
  </section>

  <section class="about-preview">
    <img src="images/team.png" alt="Questoria team">

    <div class="about-text">
      <h2 data-key="aboutTitle">About us</h2>
      <p data-key="aboutText">
        Questoria is a team of enthusiasts who create live role-playing games
        (questories), where participants become the heroes of the story.
      </p>

      <a href="about.html" class="see-more" data-key="seeMore">see more</a>
    </div>
  </section>

</main>

<footer class="footer">
  <img src="images/mini-logo.png" alt="Questoria logo">
  <p>2020-2026</p>
</footer>

<script src="js/script.js"></script>
<script src="js/lang.js"></script>
<script src="js/api-client.js"></script>
<script src="js/auth.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    try {
      const quests = await apiClient.getQuests();
      const container = document.getElementById('quests-container');
      
      if (!quests || quests.length === 0) {
        container.innerHTML = '<p>No quests available</p>';
        return;
      }

      container.innerHTML = '';
      
      // Show first 3 quests as recommended
      quests.slice(0, 3).forEach(quest => {
        const article = document.createElement('article');
        article.className = 'card';
        article.innerHTML = `
          <a href="quest.html?id=${quest.id}" class="quest-card">
            <img src="${quest.image || 'images/img1.png'}" alt="${quest.title}">
          </a>
          <h3>${quest.title}</h3>
          <p>from €${parseFloat(quest.price_per_person).toFixed(2)} per person</p>
          <span>★ ${parseFloat(quest.rating).toFixed(1)}</span>
        `;
        container.appendChild(article);
      });
    } catch (error) {
      console.error('Error loading quests:', error);
      document.getElementById('quests-container').innerHTML = '<p>Error loading quests</p>';
    }
  });
</script>
</body>
</html>
