<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Kalnia&family=Lora&display=swap" rel="stylesheet">
  <title>Login</title>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Questoria logo">
  </a>

  <nav class="nav">
    <a href="catalog.html">Cattalog</a>
    <span>|</span>
    <a href="contacts.html">Contact</a>
    <span>|</span>
    <a href="about.html">About us</a>
  </nav>

  <div class="actions">
  <button class="lang">En</button>

</header>

<main class="login-page">
  <section class="login-card">
    <h1>Login</h1>

    <form>
      <input type="email" placeholder="Email">
      
      <div class="password-box">
        <input type="password" placeholder="Password" id="password">
        <button type="button" class="toggle-password">
          👁
        </button>
      </div>
      <div class="password-error"></div>

      <div class="small-link">
        Forgot your password? <a href="#">Click Here</a>
      </div>

      <button class="login-btn" type="submit">Login</button>

      <div class="signup">
        Need an account?<br>
        <a href="register.html">Click Here</a>
      </div>

      <div class="line"></div>

      <p class="or">Sign-Up with</p>

      <button class="google-btn" type="button">
        <span>G</span> Continue with Google
      </button>
    </form>
  </section>
</main>

<footer class="footer">
  <img src="images/mini-logo.png" alt="Questoria logo">
  <p>2020-2026</p>
</footer>
<script src="js/script.js"></script>
</body>
</html>
