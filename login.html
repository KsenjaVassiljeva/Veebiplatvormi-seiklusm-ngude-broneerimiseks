<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Kalnia&family=Lora&display=swap" rel="stylesheet">
  <title>Login</title>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Questoria logo">
  </a>

  <nav class="nav">
    <a href="catalog.html" data-key="catalog">Catalog</a>
    <span>|</span>
    <a href="contacts.html" data-key="contact">Contact</a>
    <span>|</span>
    <a href="about.html" data-key="about">About us</a>
  </nav>

  <div class="actions">
    <button class="lang">En</button>
    <div class="user-menu" style="display: none;">
      <button class="user-icon">👤</button>
      <div class="dropdown-menu">
        <a href="profile.html" class="menu-item profile-link" data-key="profile">👤 Profile</a>
        <a href="#" class="menu-item logout-link" data-key="logout">🚪 Logout</a>
      </div>
    </div>
  </div>
</header>

<main class="login-page">
  <section class="login-card">
    <h1 data-key="loginTitle">Login</h1>

    <form>
      <input type="email" placeholder="Email" data-placeholder="email">
      
      <div class="password-box">
        <input type="password" placeholder="Password" id="password" data-placeholder="password">
        <button type="button" class="toggle-password">
          👁
        </button>
      </div>
      <div class="password-error"></div>

      <div class="small-link">
        <span data-key="forgotPassword">Forgot your password?</span> <a href="#">Click Here</a>
      </div>

      <button class="login-btn" type="submit" data-key="loginBtn">Login</button>

      <div class="signup">
        <span data-key="needAccount">Need an account?</span><br>
        <a href="register.html">Click Here</a>
      </div>

      <div class="line"></div>

      <p class="or" data-key="signUpWith">Sign-Up with</p>

      <button class="google-btn" type="button">
        <span>G</span> <span data-key="continueGoogle">Continue with Google</span>
      </button>
    </form>
  </section>
</main>

<footer class="footer">
  <img src="images/mini-logo.png" alt="Questoria logo">
  <p>2020-2026</p>
</footer>
<script src="js/api-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/lang.js"></script>
<script src="js/script.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.querySelector("form");
    
    if (form) {
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const email = form.querySelector('input[type="email"]').value;
        const password = form.querySelector('#password').value;
        const emailError = form.querySelector('.email-error');
        const passwordError = form.querySelector('.password-error');
        
        if (!emailError || !passwordError) {
          form.insertAdjacentHTML('beforeend', '<div class="email-error"></div><div class="password-error"></div>');
        }

        try {
          const response = await apiClient.login(email, password);
          apiClient.setToken(response.token);
          alert('Login successful!');
          window.location.href = 'catalog.html';
        } catch (error) {
          const errorDiv = form.querySelector('input[type="email"]').parentElement;
          const errorElement = form.querySelector('.password-error') || form.appendChild(document.createElement('div'));
          errorElement.textContent = error.message;
          errorElement.style.color = 'red';
        }
      });
    }
  });
</script>
</body>
</html>
