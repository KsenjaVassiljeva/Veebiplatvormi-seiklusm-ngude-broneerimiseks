<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="images/logo.png" alt="Questoria">
    <span>Questoria</span>
  </div>

  <nav class="nav">
    <a href="catalog.html">Cattalog</a>
    <span>|</span>
    <a href="contact.html">Contact</a>
    <span>|</span>
    <a href="about.html">About us</a>
  </nav>

  <button class="lang">En</button>
  <a href="login.html" class="login-btn">Log in</a>
</header>

<main class="auth-page">
  <h1>Login</h1>

  <form class="auth-card">
    <input type="email" placeholder="Email">
    <div class="password-wrapper">
     <input type="password" placeholder="Password">
    </div>

    <button class="main-btn" type="submit">Login</button>

    <a class="small-link" href="#">Forgot your password</a>

    <div class="line"></div>

    <p>Don't have an account? <a href="register.html">Register</a></p>

    <button class="google-btn" type="button">
      <span class="google-icon">◎</span>
      Google
    </button>
  </form>
</main>

<footer class="footer">
  <img src="images/mini-logo.png" alt="Questoria">
  <div>
    <h2>Questoria</h2>
    <p>2020-2026</p>
  </div>
</footer>
<script src="js/script.js"></script>

</body>
</html>
