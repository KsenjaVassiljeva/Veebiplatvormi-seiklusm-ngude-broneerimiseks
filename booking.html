<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/book.css">
  <link href="https://fonts.googleapis.com/css2?family=Kalnia&family=Lora&display=swap" rel="stylesheet">
  <title>Booking</title>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Questoria logo">
  </a>

  <nav class="nav">
    <a href="catalog.html">Cattalog</a>
    <span>|</span>
    <a href="contacts.html">Contact</a>
    <span>|</span>
    <a href="about.html">About us</a>
  </nav>

  <div class="actions">
    <button class="lang">En</button>
    <button class="login">Log in</button>
  </div>
</header>

<main class="booking-page">

  <section class="quest-head">
    <img src="images/img1.png" alt="The Secret of the Kidnapper">

    <div>
      <h1>The Secret of the Kidnapper</h1>
      <div class="meta">
        <span>★ 5.0</span>
        <span>👤 1</span>
        <span>Time: 1h 30min</span>
        <span>Ultra hard</span>
        <span>Horror</span>
      </div>
    </div>
  </section>

  <section class="booking-box">
    <h2>Choose date and time</h2>

    <div class="schedule">
      <div class="day">5 May</div>
      <button>15:30</button>
      <button>17:00</button>
      <button>18:30</button>
      <button>20:00</button>

      <div class="day">6 May</div>
      <button>15:30</button>
      <button class="selected">17:00</button>
      <button>18:30</button>
      <button>20:00</button>

      <div class="day">7 May</div>
      <button>15:30</button>
      <button>17:00</button>
      <button>18:30</button>
      <button>20:00</button>

      <div class="day">8 May</div>
      <button>15:30</button>
      <button>17:00</button>
      <button>18:30</button>
      <button>20:00</button>

      <div class="day">9 May</div>
      <button>15:30</button>
      <button>17:00</button>
      <button>18:30</button>
      <button>20:00</button>
    </div>
  </section>

  <div class="booking-bottom">
    <button class="booking-btn">Booking</button>
  </div>

</main>

<footer class="footer">
  <img src="images/mini-logo.png" alt="Questoria logo">
  <p>2020-2026</p>
</footer>

</body>
</html>
