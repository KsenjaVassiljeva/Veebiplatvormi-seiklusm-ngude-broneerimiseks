<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/book.css">
  <link href="https://fonts.googleapis.com/css2?family=Kalnia&family=Lora&display=swap" rel="stylesheet">
  <title>Booking</title>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Questoria logo">
  </a>

  <nav class="nav">
    <a href="catalog.html">Cattalog</a>
    <span>|</span>
    <a href="contacts.html">Contact</a>
    <span>|</span>
    <a href="about.html">About us</a>
  </nav>

  <div class="actions">
    <button class="lang">En</button>
    <button class="login-small" data-key="login">Log in</button>
    <div class="user-menu" style="display: none;">
      <button class="user-icon">👤</button>
      <div class="dropdown-menu">
        <a href="#" class="menu-item profile-link" data-key="profile">👤 Profile</a>
        <a href="#" class="menu-item logout-link" data-key="logout">🚪 Logout</a>
      </div>
    </div>
  </div>
</header>

<main class="booking-page">

  <section class="quest-head">
    <img src="images/img1.png" alt="The Secret of the Kidnapper">

    <div>
      <h1>The Secret of the Kidnapper</h1>
      <div class="meta">
        <span>★ 5.0</span>
        <span>👤 1</span>
        <span>Time: 1h 30min</span>
        <span>Ultra hard</span>
        <span>Horror</span>
      </div>
    </div>
  </section>

  <section class="booking-box">
    <h2>Choose date and time</h2>

    <div class="schedule" id="schedule-container">
      <p>Loading available times...</p>
    </div>
  </section>

  <div class="booking-bottom">
    <input type="number" id="people-count" min="1" max="4" value="1" placeholder="Number of people">
    <button class="booking-btn" id="booking-btn">Booking</button>
  </div>

</main>

<footer class="footer">
  <img src="images/mini-logo.png" alt="Questoria logo">
  <p>2020-2026</p>
</footer>
<script src="js/api-client.js"></script>
<script src="js/auth.js"></script>
<script>
  const questId = 1; // Default quest ID
  let selectedSlot = null;

  document.addEventListener("DOMContentLoaded", async () => {
    if (!apiClient.isAuthenticated()) {
      alert('Please log in first');
      window.location.href = 'login.html';
      return;
    }

    try {
      const slots = await apiClient.getQuestSlots(questId);
      renderSchedule(slots);
    } catch (error) {
      console.error('Error loading slots:', error);
      document.getElementById('schedule-container').innerHTML = '<p>Error loading available times</p>';
    }

    document.getElementById('booking-btn').addEventListener('click', async () => {
      if (!selectedSlot) {
        alert('Please select a time slot');
        return;
      }

      const numberOfPeople = parseInt(document.getElementById('people-count').value);

      try {
        const response = await apiClient.createBooking(selectedSlot, numberOfPeople);
        alert('Booking successful! Confirmation: ' + response.booking.id);
        window.location.href = 'catalog.html';
      } catch (error) {
        alert('Booking failed: ' + error.message);
      }
    });
  });

  function renderSchedule(slots) {
    const container = document.getElementById('schedule-container');
    const slotsByDate = {};

    // Group slots by date
    slots.forEach(slot => {
      const date = new Date(slot.date);
      const dateKey = date.toLocaleDateString('en-US', { 
        month: 'numeric', 
        day: 'numeric', 
        year: 'numeric' 
      });

      if (!slotsByDate[dateKey]) {
        slotsByDate[dateKey] = [];
      }
      slotsByDate[dateKey].push(slot);
    });

    // Render HTML
    container.innerHTML = '';
    Object.keys(slotsByDate).forEach(date => {
      const dayDiv = document.createElement('div');
      dayDiv.className = 'day';
      dayDiv.textContent = date;
      container.appendChild(dayDiv);

      slotsByDate[date].forEach(slot => {
        const button = document.createElement('button');
        button.textContent = slot.time.substring(0, 5);
        button.type = 'button';
        
        if (slot.available_slots <= 0) {
          button.disabled = true;
          button.style.opacity = '0.5';
        } else {
          button.addEventListener('click', () => {
            document.querySelectorAll('.schedule button').forEach(b => b.classList.remove('selected'));
            button.classList.add('selected');
            selectedSlot = slot.id;
          });
        }
        
        container.appendChild(button);
      });
    });
  }
</script>
</body>
</html>
