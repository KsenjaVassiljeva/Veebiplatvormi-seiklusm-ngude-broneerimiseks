<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/catalog.css">
  <link href="https://fonts.googleapis.com/css2?family=Kalnia&family=Lora&display=swap" rel="stylesheet">
  <title>Catalog</title>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Questoria logo">
  </a>

  <nav class="nav">
    <a href="catalog.html" data-key="catalog">Catalog</a>
    <span>|</span>
    <a href="contacts.html" data-key="contact">Contact</a>
    <span>|</span>
    <a href="about.html" data-key="about">About us</a>
  </nav>

  <div class="actions">
    <button class="lang">En</button>
    <a href="login.html" class="login-small" data-key="login">Log in</a>
    <div class="user-menu" style="display: none;">
      <button class="user-icon">👤</button>
      <div class="dropdown-menu">
        <a href="#" class="menu-item profile-link" data-key="profile">👤 Profile</a>
        <a href="#" class="menu-item logout-link" data-key="logout">🚪 Logout</a>
      </div>
    </div>
  </div>
</header>

<main class="catalog-page">
  <div id="quests-container" class="cards">
    <p>Loading quests...</p>
  </div>
</main>

<footer class="footer">
  <img src="images/mini-logo.png" alt="Questoria logo">
  <p>2020-2026</p>
</footer>
<script src="js/api-client.js"></script>
<script src="js/script.js"></script>
<script src="js/lang.js"></script>
<script src="js/auth.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const container = document.getElementById('quests-container');
    
    try {
      const quests = await apiClient.getQuests();
      
      if (!quests || quests.length === 0) {
        container.innerHTML = '<p>No quests available</p>';
        return;
      }

      container.innerHTML = '';
      
      quests.forEach(quest => {
        const card = document.createElement('a');
        card.href = `quest.html?id=${quest.id}`;
        card.className = 'card';
        card.innerHTML = `
          <img src="${quest.image || 'images/img1.png'}" alt="${quest.title}">
          <h3>${quest.title}</h3>
          <p>from €${parseFloat(quest.price_per_person).toFixed(2)} per person</p>
          <span>★ ${parseFloat(quest.rating).toFixed(1)}</span>
        `;
        container.appendChild(card);
      });
    } catch (error) {
      console.error('Error loading quests:', error);
      container.innerHTML = '<p>Error loading quests. Please try again.</p>';
    }
  });
</script>
</body>
</html>
