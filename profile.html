<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Kalnia&family=Lora&display=swap" rel="stylesheet">
  <title>Profile</title>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Questoria logo">

  <nav class="nav">

      <p>Date: 6 May</p>

<footer class="footer">
  <img src="images/mini-logo.png" alt="Questoria logo">
  <p>2020-2026</p>
</footer>

<script src="js/profile.js"></script>
