<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/register.css">
  <link href="https://fonts.googleapis.com/css2?family=Kalnia&family=Lora&display=swap" rel="stylesheet">
  <title>Register</title>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Questoria logo">
  </a>

  <nav class="nav">
    <a href="catalog.html">Cattalog</a>
    <span>|</span>
    <a href="contacts.html">Contact</a>
    <span>|</span>
    <a href="about.html">About us</a>
  </nav>

  <div class="actions">
    <button class="lang">En</button>
    <button class="user-icon" style="display: none;">👤</button>
  </div>
</header>

<main class="register-page">
  <section class="register-card">
    <h1>Register</h1>

    <form>
      <div class="name-row">
        <input type="text" placeholder="Name">
        <input type="text" placeholder="Last Name">
      </div>

      <input type="email" placeholder="Email">

      <div class="password-box">
        <input type="password" placeholder="Password" id="password">
        <button type="button" class="toggle-password">👁</button>
      </div>

      <button class="register-btn" type="submit">Register</button>

      <div class="login-link">
        Have account?<br>
        <a href="login.html">Click Here</a>
      </div>

      <div class="line"></div>

      <p class="or">Sign-Up with</p>

      <button class="google-btn" type="button">
        <span>G</span> Continue with Google
      </button>
    </form>
  </section>
</main>

<footer class="footer">
  <img src="images/mini-logo.png" alt="Questoria logo">
  <p>2020-2026</p>
</footer>

<script src="js/api-client.js"></script>
<script src="js/script.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.querySelector("form");
    
    if (form) {
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const nameInput = form.querySelector('.name-row input[type="text"]:first-child');
        const lastNameInput = form.querySelector('.name-row input[type="text"]:last-child');
        const email = form.querySelector('input[type="email"]').value;
        const password = form.querySelector('#password').value;
        
        const firstName = nameInput.value;
        const lastName = lastNameInput.value;

        try {
          if (!firstName || !lastName || !email || !password) {
            alert('Please fill all fields');
            return;
          }

          const response = await apiClient.register(firstName, lastName, email, password);
          apiClient.setToken(response.token);
          alert('Registration successful!');
          window.location.href = 'catalog.html';
        } catch (error) {
          alert('Registration failed: ' + error.message);
        }
      });
    }
  });
</script>
</body>
</html>
