<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/register.css">
  <link href="https://fonts.googleapis.com/css2?family=Kalnia&family=Lora&display=swap" rel="stylesheet">
  <title>Register</title>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Questoria logo">
  </a>

  <nav class="nav">
    <a href="catalog.html" data-key="catalog">Catalog</a>
    <span>|</span>
    <a href="contacts.html" data-key="contact">Contact</a>
    <span>|</span>
    <a href="about.html" data-key="about">About us</a>
  </nav>

  <div class="actions">
    <button class="lang">En</button>
    <div class="user-menu" style="display: none;">
      <button class="user-icon">👤</button>
      <div class="dropdown-menu">
        <a href="profile.html" class="menu-item profile-link" data-key="profile">👤 Profile</a>
        <a href="#" class="menu-item logout-link" data-key="logout">🚪 Logout</a>
      </div>
    </div>
  </div>
</header>

<main class="register-page">
  <section class="register-card">
    <h1 data-key="registerTitle">Register</h1>

    <form>
      <div class="name-row">
        <input type="text" placeholder="Name" data-placeholder="firstName">
        <input type="text" placeholder="Last Name" data-placeholder="lastName">
      </div>

      <input type="email" placeholder="Email" data-placeholder="email">

      <div class="password-box">
        <input type="password" placeholder="Password" id="password" data-placeholder="password">
        <button type="button" class="toggle-password">👁</button>
      </div>
      
      <div class="terms">
        <input type="checkbox" id="agree" required>
        <label for="agree">
          I agree with
          <a href="terms.html">Terms</a>
          and
          <a href="privacy.html">Privacy Policy</a>
        </label>
      </div>

      <button class="register-btn" type="submit" data-key="registerBtn">Register</button>

      <div class="login-link">
        <span data-key="haveAccount">Have account?</span><br>
        <a href="login.html">Click Here</a>
      </div>

      <div class="line"></div>

      <p class="or" data-key="signUpWith">Sign-Up with</p>

      <button class="google-btn" type="button">
        <span>G</span> <span data-key="continueGoogle">Continue with Google</span>
      </button>
    </form>
  </section>
</main>

<footer class="footer">
  <img src="images/mini-logo.png" alt="Questoria logo">
  <p>2020-2026</p>
</footer>

<script src="js/api-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/lang.js"></script>
<script src="js/script.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.querySelector("form");
    
    if (form) {
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const nameInput = form.querySelector('.name-row input[type="text"]:first-child');
        const lastNameInput = form.querySelector('.name-row input[type="text"]:last-child');
        const email = form.querySelector('input[type="email"]').value;
        const password = form.querySelector('#password').value;
        
        const firstName = nameInput.value;
        const lastName = lastNameInput.value;

        try {
          if (!firstName || !lastName || !email || !password) {
            alert('Please fill all fields');
            return;
          }

          const agree = form.querySelector("#agree").checked;
          
          if (!agree) {
            alert("Please agree with Terms and Privacy Policy");
            return;
}

          const response = await apiClient.register(firstName, lastName, email, password);
          apiClient.setToken(response.token);
          alert('Registration successful!');
          window.location.href = 'catalog.html';
        } catch (error) {
          alert('Registration failed: ' + error.message);
        }
      });
    }
  });
</script>
</body>
</html>
